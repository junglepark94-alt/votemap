<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제9회 전국동시지방선거 개표 결과</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif; background: #0f1117; color: #e0e0e0;
         display: flex; flex-direction: column; }

  header {
    padding: 10px 24px;
    background: #1a1d26;
    border-bottom: 1px solid #2a2d3a;
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  }
  header h1 { font-size: 1.05rem; font-weight: 700; color: #fff; white-space: nowrap; }
  .header-sub { font-size: 0.72rem; color: #888; margin-top: 2px; white-space: nowrap; }

  /* Region tabs */
  .region-tabs {
    display: flex; gap: 4px; margin-left: auto;
  }
  .region-tab {
    padding: 5px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 600;
    cursor: pointer; border: 1px solid #3a3d4a; color: #aaa; transition: all 0.15s;
    white-space: nowrap;
  }
  .region-tab:hover { border-color: #666; color: #ddd; }
  .region-tab.active { background: #3d7fff; border-color: #3d7fff; color: #fff; }

  /* Election type tabs */
  .ec-tabs-wrap {
    background: #151821; border-bottom: 1px solid #2a2d3a;
    padding: 6px 24px; display: flex; align-items: center; gap: 8px;
  }
  .ec-tabs-wrap.hidden { display: none; }
  .ec-label { font-size: 0.72rem; color: #666; margin-right: 4px; }
  .ec-tab {
    padding: 4px 14px; border-radius: 16px; font-size: 0.78rem; font-weight: 600;
    cursor: pointer; border: 1px solid #2a2d3a; color: #888; transition: all 0.15s;
  }
  .ec-tab:hover { border-color: #555; color: #ccc; }
  .ec-tab.active { background: #232636; border-color: #4a5080; color: #ddd; }

  /* Summary bar */
  .summary-bar {
    display: flex; background: #1a1d26; border-bottom: 1px solid #2a2d3a;
    padding: 8px 24px; align-items: center; gap: 16px; flex-wrap: nowrap;
    overflow-x: auto; min-height: 46px;
  }
  .summary-item { text-align: center; white-space: nowrap; flex-shrink: 0; }
  .summary-item .label { font-size: 0.63rem; color: #888; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.04em; }
  .summary-item .value { font-size: 0.86rem; font-weight: 700; white-space: nowrap; }
  .ppp-color { color: #ff6b6b; }
  .dp-color  { color: #5b8fff; }
  .ref-color { color: #ffb74d; }
  .divider { width: 1px; height: 28px; background: #2a2d3a; flex-shrink: 0; }

  .vote-bar-wrap { flex: 1; min-width: 120px; }
  .vote-bar-labels { display: flex; justify-content: space-between; font-size: 0.63rem; color: #888; margin-bottom: 3px; }
  .vote-bar { height: 7px; border-radius: 4px; overflow: hidden; display: flex; background: #2a2d3a; }
  .vote-bar .dp-seg  { background: #2979ff; }
  .vote-bar .ppp-seg { background: #ff4444; }

  /* Main layout */
  .main { display: flex; flex: 1; min-height: 0; }
  .map-wrap { position: relative; flex: 1; min-width: 0; }
  #map { position: absolute; inset: 0; }
  .sidebar {
    width: 320px; min-width: 320px; background: #1a1d26; border-left: 1px solid #2a2d3a;
    overflow-y: auto; display: flex; flex-direction: column;
  }
  .sidebar-header {
    padding: 12px 18px; font-size: 0.78rem; color: #888;
    border-bottom: 1px solid #2a2d3a; text-transform: uppercase; letter-spacing: 0.05em;
    position: sticky; top: 0; background: #1a1d26; z-index: 2;
  }
  .district-list { padding: 6px 0; }
  .district-item {
    display: flex; align-items: center; padding: 9px 18px; cursor: pointer;
    border-bottom: 1px solid #1e2030; transition: background 0.15s;
  }
  .district-item:hover, .district-item.active { background: #252836; }
  .district-rank { width: 20px; font-size: 0.68rem; color: #555; flex-shrink: 0; }
  .district-color-dot { width: 9px; height: 9px; border-radius: 50%; margin-right: 9px; flex-shrink: 0; }
  .district-name { flex: 1; font-size: 0.84rem; min-width: 0; }
  .district-gap {
    font-size: 0.75rem; font-weight: 600;
    padding: 2px 7px; border-radius: 8px; flex-shrink: 0; white-space: nowrap;
  }
  .district-gap.ppp { background: rgba(255,68,68,0.15); color: #ff6b6b; }
  .district-gap.dp  { background: rgba(41,121,255,0.15); color: #5b8fff; }
  .district-gap.ind { background: rgba(150,150,150,0.15); color: #aaa; }

  /* Detail panel */
  .detail-panel {
    display: none; position: fixed; right: 320px; bottom: 24px;
    width: 360px; background: #1e2230; border: 1px solid #2a2d3a;
    border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    z-index: 1000; padding: 18px;
  }
  .detail-panel.show { display: block; }
  .detail-panel .dp-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 12px; color: #fff; }
  .detail-panel .dp-close { float: right; cursor: pointer; color: #666; font-size: 1.1rem; line-height: 1; }
  .detail-panel .dp-close:hover { color: #fff; }
  .cand-row { display: flex; align-items: center; margin-bottom: 9px; }
  .cand-row .cand-name { width: 105px; font-size: 0.8rem; flex-shrink: 0; }
  .cand-row .cand-bar-wrap { flex: 1; margin: 0 8px; }
  .cand-row .cand-bar { height: 6px; border-radius: 3px; }
  .cand-row .cand-pct { width: 44px; text-align: right; font-size: 0.8rem; font-weight: 600; flex-shrink: 0; }
  .cand-row .cand-votes { font-size: 0.7rem; color: #888; margin-top: 2px; }
  .detail-extra { margin-top: 10px; padding-top: 10px; border-top: 1px solid #2a2d3a; font-size: 0.76rem; color: #888; }
  .detail-extra span { color: #ccc; }
  .winner-badge {
    display: inline-block; padding: 2px 7px; border-radius: 7px;
    font-size: 0.65rem; font-weight: 700; margin-left: 6px; vertical-align: middle;
  }
  .winner-ppp { background: #ff4444; color: #fff; }
  .winner-dp  { background: #2979ff; color: #fff; }
  .winner-ind { background: #888; color: #fff; }

  /* Map tooltip */
  .map-tooltip {
    background: rgba(15,17,23,0.95); border: 1px solid #2a2d3a; border-radius: 8px;
    padding: 9px 13px; font-size: 0.8rem; color: #e0e0e0; pointer-events: none;
    min-width: 170px; box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  .map-tooltip .tt-name { font-weight: 700; font-size: 0.88rem; margin-bottom: 5px; color: #fff; }
  .map-tooltip .tt-row { display: flex; justify-content: space-between; gap: 14px; margin-bottom: 2px; }
  .map-tooltip .tt-cand { font-size: 0.76rem; }
  .map-tooltip .tt-pct  { font-weight: 700; font-size: 0.8rem; }
  .tt-winner { font-size: 0.65rem; font-weight: 700; padding: 1px 5px; border-radius: 5px; margin-left: 4px; }

  /* Loading overlay */
  #mapLoading {
    display: none; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%); z-index: 900;
    background: rgba(15,17,23,0.85); color: #aaa;
    padding: 16px 28px; border-radius: 10px; font-size: 0.9rem;
    pointer-events: none;
  }
  #mapLoading.show { display: block; }
  .map-wrap { position: relative; flex: 1; }

  /* Sidebar toggle button (mobile only) */
  .sidebar-toggle {
    display: none;
    position: absolute; top: 12px; right: 12px; z-index: 800;
    width: 42px; height: 42px; border-radius: 10px;
    background: rgba(26,29,38,0.92); border: 1px solid #3a3d4a;
    color: #ccc; font-size: 1.2rem; cursor: pointer;
    align-items: center; justify-content: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    backdrop-filter: blur(6px);
  }
  .sidebar-toggle:active { background: #2a2d3a; }

  /* Sidebar overlay backdrop (mobile only) */
  .sidebar-backdrop {
    display: none; position: fixed; inset: 0; z-index: 998;
    background: rgba(0,0,0,0.5);
  }
  .sidebar-backdrop.show { display: block; }
  .sidebar-close { display: none; }

  /* Label mode toggle button */
  .label-mode-btn {
    position: absolute; top: 12px; right: 12px; z-index: 800;
    height: 36px; padding: 0 13px; border-radius: 9px;
    background: rgba(26,29,38,0.92); border: 1px solid #3a3d4a;
    color: #999; font-size: 0.74rem; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    backdrop-filter: blur(6px); transition: all 0.15s;
    font-family: inherit;
  }
  .label-mode-btn:hover { border-color: #666; color: #ddd; }
  .label-mode-btn.active { background: #3d7fff; border-color: #3d7fff; color: #fff; }

  /* Permanent label markers (leader-line callouts) */
  .plabel-marker {
    background: none !important;
    border: none !important;
  }
  .plabel-compact {
    transform: translate(-50%, -50%);
    background: rgba(15,17,23,0.9);
    border: 1px solid rgba(255,255,255,0.18);
    color: #e0e0e0; font-size: 0.7rem;
    padding: 4px 9px; border-radius: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    white-space: nowrap; pointer-events: none;
  }
  .plabel-compact b { color: #fff; font-size: 0.72rem; }
  .plabel-compact .pgap { color: #777; font-size: 0.6rem; }

  /* ── Mobile responsive ── */
  @media (max-width: 768px) {
    header {
      padding: 8px 14px; gap: 8px;
    }
    header h1 { font-size: 0.88rem; }
    .header-sub { font-size: 0.64rem; }
    .region-tabs {
      margin-left: 0; overflow-x: auto; -webkit-overflow-scrolling: touch;
      flex-shrink: 0; width: 100%;
    }
    .region-tab { padding: 4px 11px; font-size: 0.72rem; flex-shrink: 0; }

    .ec-tabs-wrap {
      padding: 5px 14px; gap: 5px;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    .ec-tab { padding: 3px 10px; font-size: 0.7rem; flex-shrink: 0; white-space: nowrap; }

    .summary-bar { padding: 6px 14px; gap: 10px; min-height: 38px; }
    .summary-item .label { font-size: 0.58rem; }
    .summary-item .value { font-size: 0.76rem; }

    .sidebar-toggle { display: flex; }
    .label-mode-btn { right: 62px; font-size: 0.68rem; height: 34px; padding: 0 10px; }

    .main { position: relative; }
    .map-wrap { flex: 1; min-width: 0; }

    .sidebar {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 300px; max-width: 85vw; z-index: 999;
      transform: translateX(100%);
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      border-left: 1px solid #2a2d3a;
    }
    .sidebar.open { transform: translateX(0); }

    .sidebar-header {
      display: flex; align-items: center; justify-content: space-between;
    }

    .sidebar-close {
      display: inline-block;
      font-size: 1.1rem; color: #888; cursor: pointer;
      padding: 4px 8px; margin: -4px -8px;
    }
    .sidebar-close:active { color: #fff; }

    .detail-panel {
      position: fixed; right: 0 !important; bottom: 0 !important; left: 0;
      width: 100% !important; max-height: 60vh;
      border-radius: 16px 16px 0 0;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .detail-panel.show {
      display: block;
      transform: translateY(0);
    }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>제9회 전국동시지방선거 개표 결과</h1>
    <div class="header-sub">2026년 6월 3일 실시 · 최종 개표 결과 (중앙선거관리위원회)</div>
  </div>
  <div class="region-tabs">
    <div class="region-tab active" data-region="seoul">서울특별시</div>
    <div class="region-tab" data-region="chungbuk">충청북도</div>
    <div class="region-tab" data-region="chungnam">충청남도</div>
  </div>
</header>

<div class="ec-tabs-wrap hidden" id="ecTabsWrap">
  <span class="ec-label">선거 종류</span>
  <div class="ec-tab active" data-ec="3">시도지사선거</div>
  <div class="ec-tab" data-ec="4">구시군장선거</div>
  <div class="ec-tab" data-ec="5">시도의회의원</div>
  <div class="ec-tab" data-ec="6">구시군의회의원</div>
</div>

<div class="summary-bar" id="summaryBar"></div>

<div class="main" id="mainWrap">
  <div class="map-wrap">
    <div id="map"></div>
    <div id="mapLoading">지도 불러오는 중…</div>
    <button class="label-mode-btn" id="labelModeBtn">라벨</button>
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="목록 열기">☰</button>
  </div>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header" id="sidebarHeader">시군구별 결과 목록 <span class="sidebar-close" id="sidebarClose">✕</span></div>
    <div class="district-list" id="districtList"></div>
  </div>
</div>

<div class="detail-panel" id="detailPanel">
  <span class="dp-close" id="detailClose">✕</span>
  <div class="dp-title" id="detailTitle"></div>
  <div id="detailContent"></div>
  <div class="detail-extra" id="detailExtra"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── 서울 선거 데이터 ─────────────────────────────────────────
const seoulRaw = {
  "종로구": {jeong:39395, oh:37071, kim:624,  yoo:668,  kwon:1073, voters:125290, votes:79673},
  "중구":   {jeong:33296, oh:34466, kim:590,  yoo:496,  kwon:633,  voters:109510, votes:70278},

  "성북구": {jeong:123800,oh:106852,kim:1765, yoo:2421, kwon:3007, voters:376276, votes:240296},
  "강북구": {jeong:81935, oh:65057, kim:948,  yoo:1370, kwon:1619, voters:256006, votes:153014},
  "도봉구": {jeong:89222, oh:77951, kim:1026, yoo:1225, kwon:1543, voters:271153, votes:172948},

  "서대문구":{jeong:88095, oh:79473, kim:1400, yoo:1949, kwon:2476, voters:270323, votes:175291},
  "마포구": {jeong:101820,oh:96217, kim:1706, yoo:2252, kwon:3219, voters:320072, votes:207302},
  "양천구": {jeong:115578,oh:117348,kim:1634, yoo:1730, kwon:2102, voters:364357, votes:240716},

// Convert Seoul data to unified format
const seoulData = {};
Object.entries(seoulRaw).forEach(([name, d]) => {
  const candidates = [
    {party:'dp',      partyName:'더불어민주당', name:'정원오', votes:d.jeong},
    {party:'ppp',     partyName:'국민의힘',      name:'오세훈', votes:d.oh},
    {party:'reform',  partyName:'개혁신당',       name:'김정철', votes:d.kim},
    {party:'justice', partyName:'정의당',         name:'권영국', votes:d.kwon},
    {party:'other',   partyName:'여성의당',        name:'유지혜', votes:d.yoo},

  seoulData[name] = { voters: d.voters, votes: d.votes, candidates };

function parseCouncilLabel(label) {
  const PARTIES = [
    ['더불어민주당','dp'],['국민의힘','ppp'],['개혁신당','reform'],
    ['조국혁신당','reform'],['진보당','progress'],['정의당','justice'],
    ['기본소득당','other'],['무소속','ind']
  ];
  for (const [pName, pKey] of PARTIES) {
    if (label.startsWith(pName)) return { party:pKey, partyName:pName, name:label.substring(pName.length) };
  }
  return { party:'other', partyName:'기타', name:label };
}

// GeoJSON name → city prefix (청주시상당구 → 청주시)
// 2014 청원군→청주시 통합 반영
const GEO_OLD_CITY = { '청원군': '청주시' };
function extractCityFromGeoName(nm) {
  if (GEO_OLD_CITY[nm]) return GEO_OLD_CITY[nm];
  for (const c of ['청주시','천안시','아산시','서산시','논산시','당진시','공주시','보령시','충주시','제천시']) {
    if (nm.startsWith(c) && nm.length > c.length) return c;
  }
  return nm;
}

// GeoJSON 이름 → councilData city 매핑 (행정구역 변경 반영)
// 2014 청원군→청주시청원구, 청주시상당구에서 서원구 분리
const GEO_TO_CITY_MAP = {
  '청원군': ['청주시청원구'],
  '청주시상당구': ['청주시상당구', '청주시서원구'],
};

function getCouncilAggForGeo(region, ec, nm) {
  const r = region === 'chungbuk' ? '충북' : '충남';
  const prefix = r + '__' + ec + '__';

  // GeoJSON 이름으로 매칭할 city 목록 결정
  const targetCities = GEO_TO_CITY_MAP[nm] || [nm];

  const entries = Object.entries(councilData).filter(([k, d]) => {
    return k.startsWith(prefix) && targetCities.includes(d.city);
  });
  if (entries.length === 0) return null;

  // 당선인(winners) 기반 의석 집계
  const seatMap = {};
  let voters = 0, votes = 0;
  let totalSeats = 0;
  const districts = [];

  entries.forEach(([k, d]) => {
    const distName = k.split('__')[2];
    const winners = d.winners || [];
    const isMutoopyo = d['무투표'] || false;
    voters += d.voters || 0;
    votes  += d.votes  || 0;
    totalSeats += winners.length;

    winners.forEach(w => {
      if (!seatMap[w.party]) seatMap[w.party] = { party:w.party, partyName:w.partyName, seats:0, votes:0 };
      seatMap[w.party].seats++;
      seatMap[w.party].votes += w.votes || 0;
    });

    districts.push({
      name: distName,
      '무투표': isMutoopyo,
      candidates: (d.candidates || []).sort((a,b) => b.votes - a.votes),
      winners: winners,
      seats: winners.length,
      votes: d.votes || 0,
      voters: d.voters || 0,
    });
  });

  districts.sort((a,b) => a.name.localeCompare(b.name, 'ko'));
  if (Object.keys(seatMap).length === 0) return null;
  const candidates = Object.values(seatMap).sort((a,b) => b.seats - a.seats);
  return { voters, votes, candidates, districts, totalDistricts:entries.length, totalSeats };
}

let currentEc = 3;           // 3 | 4 | 5 | 6

};

// 충북/충남 구분: GeoJSON은 구 센서스 코드 체계 사용 (충북=33, 충남=34)
// 현행 행정코드(충북=43, 충남=44)와 다름에 주의
const REGION_CODE = { chungbuk: '33', chungnam: '34' };

}).addTo(map);

// ── 헬퍼 ─────────────────────────────────────────────────────
function fmt(n) { return n.toLocaleString('ko-KR'); }
function normName(s) { return (s||'').replace(/\s+/g, ''); }

// GeoJSON feature에서 시군구명 추출
function featureName(feature) {
  const p = feature.properties;
  return p.name || p.SIG_KOR_NM || '';
}

// 여러 구의 데이터를 시 단위로 집계 (청주시 4구 → 청주시 합계)
function aggregateByCity(region, ec, cityName) {
  const r = region === 'chungbuk' ? '충북' : '충남';
  const prefix = `${r}__${ec}__${cityName}`;
  const matching = Object.entries(chungData).filter(([k]) => normName(k).startsWith(normName(prefix)));
  if (matching.length === 0) return null;
  if (matching.length === 1) return matching[0][1];
  // 여러 항목 합산
  const result = { voters: 0, votes: 0, candidates: [] };
  const candMap = {};
  matching.forEach(([, d]) => {
    result.voters += d.voters;
    result.votes  += d.votes;
    d.candidates.forEach(c => {
      if (!candMap[c.name]) candMap[c.name] = { ...c, votes: 0 };
      candMap[c.name].votes += c.votes;
    });
  });
  result.candidates = Object.values(candMap).sort((a, b) => b.votes - a.votes);
  return result;
}

// 현재 선택된 지역/선거 기준으로 데이터 조회
function getDataForName(sigName) {
  const nm = normName(sigName);
  if (currentRegion === 'seoul') {
    return seoulData[nm] || seoulData[sigName] || null;
  }
  const region = currentRegion === 'chungbuk' ? '충북' : '충남';
  const r = region;
  if (currentEc === 3) {
    // 정확히 일치하는 키 먼저 시도
    const exact = chungData[`${r}__3__${nm}`];
    if (exact) return exact;
    // 없으면 이 이름이 시(市) 접두사인 경우 → 하위 구 데이터 합산 (e.g. 청주시 → 4구 합산)
    return aggregateByCity(currentRegion, 3, nm);
  } else if (currentEc === 4) {
    return chungData[`${r}__4__${nm}`] || chungData[`${r}__4__${extractCityFromGeoName(nm)}`] || null;
  } else if (currentEc === 5 || currentEc === 6) {
    return getCouncilAggForGeo(currentRegion, currentEc, nm);
  }
  return null;
}

// 후보 중 최다 득표자 반환
function getWinner(d) {
  if (!d) return null;
  return d.candidates.reduce((a, b) => a.votes > b.votes ? a : b);
}

// 정당 색상
const PARTY_COLOR = {
  dp:      '#2979ff',
  ppp:     '#ff4444',
  reform:  '#ff9800',
  justice: '#ffeb3b',
  progress:'#e040fb',
  jinbo:   '#e040fb',
  joguk:   '#00bcd4',
  ind:     '#999999',
  other:   '#aaaaaa',
};
function partyColor(party) { return PARTY_COLOR[party] || '#888'; }

// 지도 스타일
function getStyle(feature, highlight = false) {
  const name = featureName(feature);
  const d = getDataForName(name);
  if (!d) return { fillColor: '#2a2d3a', color: '#444', weight: 1, fillOpacity: 0.5 };

  let fillColor;
  if ((currentEc === 5 || currentEc === 6) && currentRegion !== 'seoul') {
    // 의회선거: 의석수 기반 색상
    const sorted = d.candidates.slice().sort((a,b) => b.seats - a.seats);
    const top = sorted[0];
    if (!top) return { fillColor: '#2a2d3a', color: '#444', weight: 1, fillOpacity: 0.5 };
    const totalSeats = d.totalSeats || sorted.reduce((s,c) => s + c.seats, 0);
    const ratio = top.seats / totalSeats; // 지배적일수록 진하게
    const intensity = Math.min((ratio - 0.3) / 0.5, 1); // 0.3~0.8 → 0~1
    if (top.party === 'ppp') {
      fillColor = `rgba(255,${Math.round(80-intensity*60)},${Math.round(80-intensity*60)},0.85)`;
    } else if (top.party === 'dp') {
      fillColor = `rgba(${Math.round(60-intensity*40)},${Math.round(120-intensity*50)},255,0.85)`;
    } else {
      fillColor = `rgba(150,150,150,0.75)`;
    }
  } else {
    // 시도지사/구시군장/서울: 득표수 기반
    const winner = getWinner(d);
    const top2 = d.candidates.slice().sort((a,b)=>b.votes-a.votes).slice(0,2);
    const validVotes = d.candidates.reduce((s,c) => s+c.votes, 0);
    const gapPct = top2.length >= 2
      ? Math.abs(top2[0].votes - top2[1].votes) / validVotes * 100
      : 50;
    const intensity = Math.min(gapPct / 20, 1);
    if (winner.party === 'ppp') {
      fillColor = `rgba(255,${Math.round(80-intensity*60)},${Math.round(80-intensity*60)},0.85)`;
    } else if (winner.party === 'dp') {
      fillColor = `rgba(${Math.round(60-intensity*40)},${Math.round(120-intensity*50)},255,0.85)`;
    } else {
      fillColor = `rgba(150,150,150,0.75)`;
    }
  }

  return {
    fillColor,
    color: highlight ? '#fff' : 'rgba(255,255,255,0.25)',
    weight: highlight ? 2.5 : 1,
    fillOpacity: highlight ? 0.95 : 0.82,
  };
}

// 툴팁
function bindTooltip(layer, feature) {
  const name = featureName(feature);
  const d = getDataForName(name);
  if (!d) return;

  if ((currentEc === 5 || currentEc === 6) && currentRegion !== 'seoul') {
    const sorted = d.candidates.slice().sort((a,b) => b.seats - a.seats);
    const totalSeats = d.totalSeats || sorted.reduce((s,c) => s + c.seats, 0);
    const top = sorted[0];
    const topColor = partyColor(top.party);
    const rows = sorted.filter(c => c.seats > 0).map(c => {
      const color = partyColor(c.party);
      return `<div class="tt-row">
        <span class="tt-cand" style="color:${color}">${c.partyName}</span>
        <span class="tt-pct" style="color:${color}">${c.seats}석</span>
      </div>`;
    }).join('');
    layer.bindTooltip(`
      <div class="map-tooltip">
        <div class="tt-name">${name}
          <span class="tt-winner" style="background:${topColor};color:#fff">${top.partyName} ${top.seats}석</span>
        </div>
        ${rows}
        <div class="tt-row" style="color:#888;font-size:0.7rem">총 ${totalSeats}석 · ${d.totalDistricts}개 선거구</div>
      </div>
    `, { sticky: true, opacity: 1 });
  } else {
    const sorted = d.candidates.slice().sort((a,b) => b.votes - a.votes);
    const w = sorted[0], r = sorted[1];
    const validVotes = d.candidates.reduce((s,c) => s+c.votes, 0);
    const wPct = (w.votes / validVotes * 100).toFixed(1);
    const rPct = r ? (r.votes / validVotes * 100).toFixed(1) : '';
    const wColor = partyColor(w.party);
    const rColor = r ? partyColor(r.party) : '#888';
    layer.bindTooltip(`
      <div class="map-tooltip">
        <div class="tt-name">${name}
          <span class="tt-winner" style="background:${wColor};color:#fff">${w.partyName} 우세</span>
        </div>
        <div class="tt-row">
          <span class="tt-cand" style="color:${wColor}">▲ ${w.name}</span>
          <span class="tt-pct" style="color:${wColor}">${wPct}%</span>
        </div>
        ${r ? `<div class="tt-row">
          <span class="tt-cand" style="color:${rColor}">▼ ${r.name}</span>
          <span class="tt-pct" style="color:${rColor}">${rPct}%</span>
        </div>` : ''}
      </div>
    `, { sticky: true, opacity: 1 });
  }
}

      }).join('<br>');

      return `

  const gap = sorted[0].votes - (sorted[1] ? sorted[1].votes : 0);
  const gapPct = (gap / validVotes * 100).toFixed(2);

  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailExtra').innerHTML =
    `유권자: <span>${fmt(d.voters)}명</span> &nbsp;·&nbsp; 투표자: <span>${fmt(d.votes)}명</span> &nbsp;·&nbsp; 투표율: <span>${turnout}%</span><br>

}

          <div class="vote-bar-labels">
            <span style="color:${rColor}">${r ? r.partyName : ''} ${rPct}%</span>
            <span style="color:${wColor}">${w.partyName} ${wPct}%</span>
          </div>
          <div class="vote-bar">
            ${r ? `<div style="flex:${r.votes};background:${rColor}"></div>` : ''}
            <div style="flex:${w.votes};background:${wColor}"></div>
          </div>
        </div>
        <div class="divider"></div>
        <div class="summary-item">
          <div class="label">표차</div>
          <div class="value" style="color:#ffc107">${fmt(gap)}표 (${gapPct}%p)</div>
        </div>
        <div class="summary-item">
          <div class="label">투표율</div>
          <div class="value" style="color:#ccc">${(totalVotes/totalVoters*100).toFixed(1)}%</div>
        </div>`;
    } else if (currentEc === 4) {
      // 구시군장 – 시군별 당선 현황 (중복 없음)
      let dpWins = 0, pppWins = 0, otherWins = 0;
      entries.forEach(([k, d]) => {
        const w = getWinner(d);
        if (w.party === 'dp') dpWins++;
        else if (w.party === 'ppp') pppWins++;
        else otherWins++;
      });
      const total = entries.length;
      bar.innerHTML = `
        <div class="summary-item">
          <div class="label">구시군장 당선 현황</div>
          <div class="value">총 ${total}개 시·군</div>
        </div>
        <div class="divider"></div>
        <div class="summary-item">
          <div class="label">🔵 더불어민주당</div>
          <div class="value dp-color">${dpWins}곳 당선</div>
        </div>
        <div class="summary-item">
          <div class="label">🔴 국민의힘</div>
          <div class="value ppp-color">${pppWins}곳 당선</div>
        </div>
        ${otherWins > 0 ? `
        <div class="summary-item">
          <div class="label">기타</div>
          <div class="value" style="color:#aaa">${otherWins}곳</div>
        </div>` : ''}
        <div class="divider"></div>
        <div class="summary-item vote-bar-wrap">
          <div class="vote-bar-labels">
            <span class="dp-color">민주 ${dpWins}곳</span>
            <span class="ppp-color">국힘 ${pppWins}곳</span>
          </div>
          <div class="vote-bar">
            <div class="dp-seg"  style="width:${(dpWins/total*100).toFixed(0)}%"></div>
            <div class="ppp-seg" style="width:${(pppWins/total*100).toFixed(0)}%"></div>
          </div>
        </div>`;
    } else if (currentEc === 5 || currentEc === 6) {
      // 의회선거 – 당선인 기반 의석 현황
      const r = currentRegion === 'chungbuk' ? '충북' : '충남';
      const prefix = `${r}__${currentEc}__`;
      const councilEntries = Object.entries(councilData).filter(([k]) => k.startsWith(prefix));

      const partySeats = {};
      let totalSeats = 0, totalDistricts = councilEntries.length;
      let totalVoters = 0, totalVotes = 0;

      councilEntries.forEach(([k, d]) => {
        totalVoters += d.voters || 0;
        totalVotes += d.votes || 0;
        const winners = d.winners || [];
        winners.forEach(w => {
          totalSeats++;
          if (!partySeats[w.party]) partySeats[w.party] = { partyName:w.partyName, seats:0 };
          partySeats[w.party].seats++;
        });
      });

      const dpSeats  = (partySeats['dp']  || { seats:0 }).seats;
      const pppSeats = (partySeats['ppp'] || { seats:0 }).seats;
      const otherSeats = totalSeats - dpSeats - pppSeats;
      const ecLabel = currentEc === 5 ? '시도의회' : '구시군의회';

      bar.innerHTML = `
        <div class="summary-item">
          <div class="label">${ecLabel} 의석 현황</div>
          <div class="value" style="color:#ccc">총 ${totalSeats}석 · ${totalDistricts}개 선거구</div>
        </div>
        <div class="divider"></div>
        <div class="summary-item">
          <div class="label">🔵 더불어민주당</div>
          <div class="value dp-color">${dpSeats}석</div>
        </div>
        <div class="summary-item">
          <div class="label">🔴 국민의힘</div>
          <div class="value ppp-color">${pppSeats}석</div>
        </div>
        ${otherSeats > 0 ? `<div class="summary-item">
          <div class="label">기타</div>
          <div class="value" style="color:#aaa">${otherSeats}석</div>
        </div>` : ''}
        <div class="divider"></div>
        <div class="summary-item vote-bar-wrap">
          <div class="vote-bar-labels">
            <span class="dp-color">민주 ${dpSeats}석</span>
            <span class="ppp-color">국힘 ${pppSeats}석</span>
          </div>
          <div class="vote-bar">
            <div class="dp-seg"  style="width:${(dpSeats/totalSeats*100).toFixed(1)}%"></div>
            <div class="ppp-seg" style="width:${(pppSeats/totalSeats*100).toFixed(1)}%"></div>
          </div>
        </div>
        <div class="divider"></div>
        <div class="summary-item">
          <div class="label">투표율</div>
          <div class="value" style="color:#ccc">${totalVoters?(totalVotes/totalVoters*100).toFixed(1):0}%</div>
        </div>`;
    }
  }
}

// ── 사이드바 ─────────────────────────────────────────────────
function buildSidebar(names) {
  // names: [{sigName, displayName, d}]
  const container = document.getElementById('districtList');
  container.innerHTML = '';

  const isCouncil = (currentEc === 5 || currentEc === 6) && currentRegion !== 'seoul';

  const sorted = names
    .filter(({d}) => d)
    .map(({sigName, displayName, d}) => {
      if (isCouncil) {
        const top = d.candidates.slice().sort((a,b) => b.seats - a.seats)[0];
        return { sigName, displayName, d, w: top, gapPct: 0, totalSeats: d.totalSeats };
      }
      const top2 = d.candidates.slice().sort((a,b)=>b.votes-a.votes);
      const w = top2[0], r = top2[1];
      const validVotes = d.candidates.reduce((s,c) => s+c.votes, 0);
      const gapPct = r ? Math.abs(w.votes - r.votes) / validVotes * 100 : 50;
      return { sigName, displayName, d, w, gapPct };
    })
    .sort((a,b) => isCouncil ? (b.totalSeats||0) - (a.totalSeats||0) : b.gapPct - a.gapPct);

  // 당선자별로 묶기
  const grouped = {};
  sorted.forEach(item => {
    const p = item.w.party;
    if (!grouped[p]) grouped[p] = [];
    grouped[p].push(item);
  });
  const order = ['ppp','dp','reform','ind','justice','progress','joguk','jinbo','other'];
  const all = order.flatMap(p => grouped[p] || []);

  all.forEach((item, i) => {
    const color = partyColor(item.w.party);
    const div = document.createElement('div');
    div.className = 'district-item';
    div.dataset.name = item.sigName;

    let infoLine, gapBadge;
    if (isCouncil) {
      const seatList = item.d.candidates.filter(c=>c.seats>0).sort((a,b)=>b.seats-a.seats)
        .map(c=>`<span style="color:${partyColor(c.party)}">${c.partyName.slice(0,2)} ${c.seats}</span>`).join(' · ');
      infoLine = seatList;
      gapBadge = `<span style="font-size:0.75rem;font-weight:700;color:${color}">${item.totalSeats}석</span>`;
    } else {
      const validVotes = item.d.candidates.reduce((s,c) => s+c.votes, 0);
      infoLine = `${item.w.name} ${(item.w.votes/validVotes*100).toFixed(1)}% · 격차 ${item.gapPct.toFixed(1)}%p`;
      gapBadge = `<span class="district-gap ${item.w.party === 'ppp' ? 'ppp' : item.w.party === 'dp' ? 'dp' : 'ind'}">+${item.gapPct.toFixed(1)}%p</span>`;
    }

    div.innerHTML = `
      <div class="district-rank">${i+1}</div>
      <div class="district-color-dot" style="background:${color}"></div>
      <div class="district-name">
        <div style="font-weight:600">${item.displayName}</div>
        <div style="font-size:0.7rem;color:#666;margin-top:1px">${infoLine}</div>
      </div>
      ${gapBadge}
    `;
    div.addEventListener('click', () => {
      showDetailPanel(item.sigName);
      document.querySelectorAll('.district-item').forEach(el => el.classList.remove('active'));
      div.classList.add('active');
      if (window.innerWidth <= 768) closeSidebar();
      if (geojsonLayer) {
        geojsonLayer.eachLayer(layer => {
          const n = featureName(layer.feature);
          if (normName(n) === normName(item.sigName) || n === item.sigName) {
            map.fitBounds(layer.getBounds(), {padding:[20,20]});
            if (selectedLayer && selectedLayer !== layer) {
              selectedLayer.setStyle(getStyle(selectedLayer.feature, false));
            }
            selectedLayer = layer;
            layer.setStyle(getStyle(layer.feature, true));
          }
        });
      }
    });
    container.appendChild(div);
  });
}

// ── GeoJSON 로드 및 레이어 구성 ──────────────────────────────
function loadAndRender() {
  const loading = document.getElementById('mapLoading');
  loading.classList.add('show');

  if (geojsonLayer) { map.removeLayer(geojsonLayer); geojsonLayer = null; }
  selectedLayer = null;
  document.getElementById('detailPanel').classList.remove('show');

  const isSeoul = currentRegion === 'seoul';
  const cacheKey = isSeoul ? 'seoul' : 'chung';
  const url = isSeoul ? GEOJSON_URLS.seoul : GEOJSON_URLS.chung;

  function render(geojson) {
    loading.classList.remove('show');
    let features = geojson.features;

    if (!isSeoul) {
      const code = REGION_CODE[currentRegion]; // '33' or '34'
      features = features.filter(f => {
        // southkorea-maps는 구 센서스 코드를 'code' 프로퍼티로 제공 (5자리 숫자)
        const cd = String(f.properties.code || f.properties.SIG_CD || '');
        return cd.startsWith(code);
      });
    }

    const filtered = { ...geojson, features };
    const sidebarNames = [];

    geojsonLayer = L.geoJSON(filtered, {
      style: feature => getStyle(feature),
      onEachFeature: (feature, layer) => {
        const raw = featureName(feature);
        const d = getDataForName(raw);
        // ec=4: 청주시상당구 등 하위 구 → 청주시로 표시, 중복 제거
        const cityDisplay = (currentEc === 4) ? extractCityFromGeoName(normName(raw)) : raw;
        if (!sidebarNames.some(x => x.d === d && x.displayName === cityDisplay)) {
          sidebarNames.push({ sigName: raw, displayName: cityDisplay, d });
        }
        bindTooltip(layer, feature);
        layer.on({
          mouseover(e) { e.target.setStyle(getStyle(feature, true)); e.target.bringToFront(); },
          mouseout(e)  { if (selectedLayer !== e.target) e.target.setStyle(getStyle(feature, false)); },
          click(e) {
            if (selectedLayer && selectedLayer !== e.target) {
              selectedLayer.setStyle(getStyle(selectedLayer.feature, false));
            }
            selectedLayer = e.target;
            e.target.setStyle(getStyle(feature, true));
            showDetailPanel(raw);
            document.querySelectorAll('.district-item').forEach(el => {
              el.classList.toggle('active', normName(el.dataset.name) === normName(raw));
            });
          }
        });
      }
    }).addTo(map);
    geojsonLayer.bringToFront();

    // Fit bounds (invalidateSize ensures container dimensions are correct on initial load)
    map.invalidateSize();
    try { map.fitBounds(geojsonLayer.getBounds(), {padding:[20,20]}); } catch(e) {}

    buildSidebar(sidebarNames);
    buildSummaryBar();
    if (labelMode) createPermanentLabels();
  }

  if (geojsonCache[cacheKey]) {
    render(geojsonCache[cacheKey]);
  } else {
    fetch(url)
      .then(r => r.json())
      .then(data => { geojsonCache[cacheKey] = data; render(data); })
      .catch(err => {
        loading.classList.remove('show');
        console.error('GeoJSON 로드 실패:', err);
      });
  }
}

// 툴팁 HTML 생성 (hover 툴팁과 동일)
function buildTooltipHtml(name, d) {
  const isCouncil = (currentEc === 5 || currentEc === 6) && currentRegion !== 'seoul';
  if (isCouncil) {
    const sorted = d.candidates.slice().sort((a,b) => b.seats - a.seats);
    const totalSeats = d.totalSeats || sorted.reduce((s,c) => s + c.seats, 0);
    const top = sorted[0];
    const topColor = partyColor(top.party);
    const rows = sorted.filter(c => c.seats > 0).map(c => {
      const color = partyColor(c.party);
      return `<div class="tt-row"><span class="tt-cand" style="color:${color}">${c.partyName}</span><span class="tt-pct" style="color:${color}">${c.seats}석</span></div>`;
    }).join('');
    return `<div class="map-tooltip">
      <div class="tt-name">${name}<span class="tt-winner" style="background:${topColor};color:#fff">${top.partyName} ${top.seats}석</span></div>
      ${rows}
      <div class="tt-row" style="color:#888;font-size:0.7rem">총 ${totalSeats}석 · ${d.totalDistricts}개 선거구</div>
    </div>`;
  } else {
    const sorted = d.candidates.slice().sort((a,b) => b.votes - a.votes);
    const w = sorted[0], r = sorted[1];
    const validVotes = d.candidates.reduce((s,c) => s+c.votes, 0);
    const wPct = (w.votes / validVotes * 100).toFixed(1);
    const rPct = r ? (r.votes / validVotes * 100).toFixed(1) : '';
    const wColor = partyColor(w.party);
    const rColor = r ? partyColor(r.party) : '#888';
    return `<div class="map-tooltip">
      <div class="tt-name">${name}<span class="tt-winner" style="background:${wColor};color:#fff">${w.partyName} 우세</span></div>
      <div class="tt-row"><span class="tt-cand" style="color:${wColor}">▲ ${w.name}</span><span class="tt-pct" style="color:${wColor}">${wPct}%</span></div>
      ${r ? `<div class="tt-row"><span class="tt-cand" style="color:${rColor}">▼ ${r.name}</span><span class="tt-pct" style="color:${rColor}">${rPct}%</span></div>` : ''}
    </div>`;
  }
}

function createPermanentLabels() {
  if (labelLayerGroup) { map.removeLayer(labelLayerGroup); labelLayerGroup = null; }
  if (!geojsonLayer) return;

  labelLayerGroup = L.layerGroup().addTo(map);

  // hover 툴팁 제거
  geojsonLayer.eachLayer(layer => layer.unbindTooltip());

  // 1) 라벨 데이터 수집
  const seen = new Set();
  const items = [];
  geojsonLayer.eachLayer(layer => {
    const name = featureName(layer.feature);
    const d = getDataForName(name);
    if (!d) return;
    const displayName = (currentEc === 4) ? extractCityFromGeoName(normName(name)) : name;
    if (seen.has(displayName)) return;
    seen.add(displayName);

    const center = layer.getBounds().getCenter();
    const px = map.latLngToContainerPoint(center);

    // 한줄 컴팩트 라벨
    const isCouncil = (currentEc === 5 || currentEc === 6) && currentRegion !== 'seoul';
    let html;
    if (isCouncil) {
      const sorted = d.candidates.slice().sort((a,b) => b.seats - a.seats);
      const top2 = sorted.filter(c => c.seats > 0).slice(0, 2);
      const seatsHtml = top2.map(c =>
        `<span style="color:${partyColor(c.party)}">${c.partyName.slice(0,2)} ${c.seats}</span>`
      ).join(' · ');
      html = `<div class="plabel-compact"><b>${displayName}</b> ${seatsHtml}</div>`;
    } else {
      const sorted = d.candidates.slice().sort((a,b) => b.votes - a.votes);
      const w = sorted[0], r = sorted[1];
      const validVotes = d.candidates.reduce((s,c) => s+c.votes, 0);
      const wPct = (w.votes / validVotes * 100).toFixed(1);
      const gap = r ? ((w.votes - r.votes) / validVotes * 100).toFixed(1) : '';
      html = `<div class="plabel-compact"><b>${displayName}</b> <span style="color:${partyColor(w.party)}">${w.name} ${wPct}%</span>${gap ? ` <span class="pgap">+${gap}%p</span>` : ''}</div>`;
    }

    items.push({ center, cx: px.x, cy: px.y, lx: px.x, ly: px.y, html });
  });

  // 2) 라벨을 폴리곤 바깥 빈 영역으로 배치
  const LW = 155, LH = 26, PAD = 6;
  const TW = LW + PAD, TH = LH + PAD;
  const mapSize = map.getSize();
  const bounds = geojsonLayer.getBounds();
  const bcPx = map.latLngToContainerPoint(bounds.getCenter());

  // 초기 위치: 폴리곤 중심에서 바깥으로 밀어내기
  items.forEach(it => {
    const dx = it.cx - bcPx.x, dy = it.cy - bcPx.y;
    const angle = Math.atan2(dy, dx);
    const dist = Math.sqrt(dx * dx + dy * dy);
    const push = Math.max(dist * 1.8, 140);
    it.lx = bcPx.x + Math.cos(angle) * push;
    it.ly = bcPx.y + Math.sin(angle) * push;
  });

  // 뷰포트 경계 내로 클램핑
  const margin = 4;
  function clamp() {
    items.forEach(it => {
      it.lx = Math.max(TW / 2 + margin, Math.min(mapSize.x - TW / 2 - margin, it.lx));
      it.ly = Math.max(TH / 2 + margin, Math.min(mapSize.y - TH / 2 - margin, it.ly));
    });
  }
  clamp();

  // 충돌 회피 (스프링 없음 — 바깥 영역에 유지)
  for (let iter = 0; iter < 60; iter++) {
    for (let i = 0; i < items.length; i++) {
      for (let j = i + 1; j < items.length; j++) {
        const a = items[i], b = items[j];
        const dx = b.lx - a.lx, dy = b.ly - a.ly;
        const ox = TW - Math.abs(dx), oy = TH - Math.abs(dy);
        if (ox > 0 && oy > 0) {
          if (ox < oy) {
            const push = ox * 0.52;
            const sign = dx >= 0 ? 1 : -1;
            a.lx -= sign * push; b.lx += sign * push;
          } else {
            const push = oy * 0.52;
            const sign = dy >= 0 ? 1 : -1;
            a.ly -= sign * push; b.ly += sign * push;
          }
        }
      }
    }
    clamp();
  }

  // 3) 마커 + 꺾은선 리더라인 생성
  items.forEach(it => {
    const labelLatLng = map.containerPointToLatLng(L.point(it.lx, it.ly));
    const dist = Math.sqrt((it.lx - it.cx) ** 2 + (it.ly - it.cy) ** 2);

    if (dist > 8) {
      // 꺾은선: 가로/세로 중 짧은 축 먼저
      const adx = Math.abs(it.lx - it.cx), ady = Math.abs(it.ly - it.cy);
      let mid;
      if (adx > ady) {
        mid = map.containerPointToLatLng(L.point(it.cx, it.ly));
      } else {
        mid = map.containerPointToLatLng(L.point(it.lx, it.cy));
      }
      L.polyline([it.center, mid, labelLatLng], {
        color: '#fff', weight: 1.5, opacity: 0.5
      }).addTo(labelLayerGroup);

      // 폴리곤 쪽 흰색 점
      L.circleMarker(it.center, {
        radius: 3, color: '#fff', fillColor: '#fff',
        fillOpacity: 0.9, weight: 0, interactive: false
      }).addTo(labelLayerGroup);
    }

    // 라벨 마커
    L.marker(labelLatLng, {
      icon: L.divIcon({
        className: 'plabel-marker',
        html: it.html,
        iconSize: [0, 0]
      }),
      interactive: false,
      zIndexOffset: 1000
    }).addTo(labelLayerGroup);
  });
}

// 줌/이동 시 라벨 재배치
map.on('zoomend', () => { if (labelMode) createPermanentLabels(); });

// ── 모바일 사이드바 토글 ─────────────────────────────────────
const sidebarEl = document.getElementById('sidebar');
const sidebarBackdrop = document.getElementById('sidebarBackdrop');
const sidebarToggleBtn = document.getElementById('sidebarToggle');
const sidebarCloseBtn = document.getElementById('sidebarClose');

function openSidebar() {
  sidebarEl.classList.add('open');
  sidebarBackdrop.classList.add('show');
}
function closeSidebar() {
  sidebarEl.classList.remove('open');
  sidebarBackdrop.classList.remove('show');
}
sidebarToggleBtn.addEventListener('click', openSidebar);
sidebarCloseBtn.addEventListener('click', closeSidebar);
sidebarBackdrop.addEventListener('click', closeSidebar);

// ── 초기 로드 ────────────────────────────────────────────────
loadAndRender();
// 지도 컨테이너가 0→비0으로 전환 시 fitBounds 재실행 (초기 로드 보정용, 1회만)
const _ro = new ResizeObserver((entries) => {
  const {width, height} = entries[0].contentRect;
  if (width > 0 && height > 0) {
    _ro.disconnect();
    map.invalidateSize();
    if (geojsonLayer) {
      try { map.fitBounds(geojsonLayer.getBounds(), {padding:[20,20]}); } catch(e) {}
    }
  }
});
_ro.observe(document.getElementById('map'));
</script>
</body>
</html>
