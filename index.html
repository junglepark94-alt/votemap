<style>

  header {

    display: flex; gap: 4px; margin-left: auto;
  }
  .region-tab {
    padding: 5px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 600;
    cursor: pointer; border: 1px solid #3a3d4a; color: #aaa; transition: all 0.15s;
    white-space: nowrap;

  .region-tab.active { background: #3d7fff; border-color: #3d7fff; color: #fff; }

  /* Election type tabs */

    background: #151821; border-bottom: 1px solid #2a2d3a;

  }
  .ec-tabs-wrap.hidden { display: none; }
  .ec-label { font-size: 0.72rem; color: #666; margin-right: 4px; }
  .ec-tab {
    padding: 4px 14px; border-radius: 16px; font-size: 0.78rem; font-weight: 600;
    cursor: pointer; border: 1px solid #2a2d3a; color: #888; transition: all 0.15s;
  }
  .ec-tab:hover { border-color: #555; color: #ccc; }
  .ec-tab.active { background: #232636; border-color: #4a5080; color: #ddd; }

  /* Summary bar */
  .summary-bar {
    display: flex; background: #1a1d26; border-bottom: 1px solid #2a2d3a;
    padding: 8px 24px; align-items: center; gap: 16px; flex-wrap: nowrap;
    overflow-x: auto; min-height: 46px;
  }
  .summary-item { text-align: center; white-space: nowrap; flex-shrink: 0; }
  .summary-item .label { font-size: 0.63rem; color: #888; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.04em; }
  .summary-item .value { font-size: 0.86rem; font-weight: 700; white-space: nowrap; }
  .ppp-color { color: #ff6b6b; }
  .dp-color  { color: #5b8fff; }
  .ref-color { color: #ffb74d; }
  .divider { width: 1px; height: 28px; background: #2a2d3a; flex-shrink: 0; }

  .vote-bar-wrap { flex: 1; min-width: 120px; }
  .vote-bar-labels { display: flex; justify-content: space-between; font-size: 0.63rem; color: #888; margin-bottom: 3px; }
  .vote-bar { height: 7px; border-radius: 4px; overflow: hidden; display: flex; background: #2a2d3a; }
  .vote-bar .dp-seg  { background: #2979ff; }
  .vote-bar .ppp-seg { background: #ff4444; }

  /* Main layout */
  .main { display: flex; flex: 1; min-height: 0; }
  .map-wrap { position: relative; flex: 1; min-width: 0; }
  #map { position: absolute; inset: 0; }
  .sidebar {
    width: 320px; min-width: 320px; background: #1a1d26; border-left: 1px solid #2a2d3a;
    overflow-y: auto; display: flex; flex-direction: column;
  }
  .sidebar-header {
    padding: 12px 18px; font-size: 0.78rem; color: #888;
    border-bottom: 1px solid #2a2d3a; text-transform: uppercase; letter-spacing: 0.05em;
    position: sticky; top: 0; background: #1a1d26; z-index: 2;
  }
  .district-list { padding: 6px 0; }
  .district-item {
    display: flex; align-items: center; padding: 9px 18px; cursor: pointer;
    border-bottom: 1px solid #1e2030; transition: background 0.15s;
  }
  .district-item:hover, .district-item.active { background: #252836; }
  .district-rank { width: 20px; font-size: 0.68rem; color: #555; flex-shrink: 0; }
  .district-color-dot { width: 9px; height: 9px; border-radius: 50%; margin-right: 9px; flex-shrink: 0; }
  .district-name { flex: 1; font-size: 0.84rem; min-width: 0; }
  .district-gap {
    font-size: 0.75rem; font-weight: 600;

  .district-gap.dp  { background: rgba(41,121,255,0.15); color: #5b8fff; }
  .district-gap.ind { background: rgba(150,150,150,0.15); color: #aaa; }

  .detail-panel {
    display: none; position: fixed; right: 320px; bottom: 24px;

    border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);

  .cand-row .cand-votes { font-size: 0.7rem; color: #888; margin-top: 2px; }
  .detail-extra { margin-top: 10px; padding-top: 10px; border-top: 1px solid #2a2d3a; font-size: 0.76rem; color: #888; }

  .winner-badge {
    display: inline-block; padding: 2px 7px; border-radius: 7px;
    font-size: 0.65rem; font-weight: 700; margin-left: 6px; vertical-align: middle;
  }
  .winner-ppp { background: #ff4444; color: #fff; }
  .winner-dp  { background: #2979ff; color: #fff; }
  .winner-ind { background: #888; color: #fff; }

  /* Map tooltip */
  .map-tooltip {
    background: rgba(15,17,23,0.95); border: 1px solid #2a2d3a; border-radius: 8px;
    padding: 9px 13px; font-size: 0.8rem; color: #e0e0e0; pointer-events: none;
    min-width: 170px; box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  .map-tooltip .tt-name { font-weight: 700; font-size: 0.88rem; margin-bottom: 5px; color: #fff; }
  .map-tooltip .tt-row { display: flex; justify-content: space-between; gap: 14px; margin-bottom: 2px; }
  .map-tooltip .tt-cand { font-size: 0.76rem; }
  .map-tooltip .tt-pct  { font-weight: 700; font-size: 0.8rem; }
  .tt-winner { font-size: 0.65rem; font-weight: 700; padding: 1px 5px; border-radius: 5px; margin-left: 4px; }

  /* Loading overlay */
  #mapLoading {
    display: none; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%); z-index: 900;
    background: rgba(15,17,23,0.85); color: #aaa;
    padding: 16px 28px; border-radius: 10px; font-size: 0.9rem;
    pointer-events: none;
  }
  #mapLoading.show { display: block; }
  .map-wrap { position: relative; flex: 1; }

// ── 헬퍼 ─────────────────────────────────────────────────────
function fmt(n) { return n.toLocaleString('ko-KR'); }
function normName(s) { return (s||'').replace(/\s+/g, ''); }

// GeoJSON feature에서 시군구명 추출
function featureName(feature) {
  const p = feature.properties;
  return p.name || p.SIG_KOR_NM || '';
}

// 현재 선택된 지역/선거 기준으로 데이터 조회
function getDataForName(sigName) {
  const nm = normName(sigName);
  if (currentRegion === 'seoul') {
    return seoulData[nm] || seoulData[sigName] || null;
  }
  const region = currentRegion === 'chungbuk' ? '충북' : '충남';
  if (currentEc === 3) {
    return chungData[`${region}__3__${nm}`] || null;
  } else {
    // ec=4: 청주시/천안시 등 구가 있는 경우 상위 시로 집약
    let base = nm;
    for (const city of ['청주시', '천안시']) {
      if (nm.startsWith(city) && nm.length > city.length) { base = city; break; }
    }
    return chungData[`${region}__4__${base}`] || null;
  }
}

function getWinner(d) {
  if (!d) return null;
  return d.candidates.reduce((a, b) => a.votes > b.votes ? a : b);
}

// 정당 색상
const PARTY_COLOR = {
  dp:      '#2979ff',
  ppp:     '#ff4444',
  reform:  '#ff9800',
  justice: '#ffeb3b',
  progress:'#e040fb',
  ind:     '#999999',
  other:   '#aaaaaa',
};
function partyColor(party) { return PARTY_COLOR[party] || '#888'; }

// 지도 스타일
function getStyle(feature, highlight = false) {
  const name = featureName(feature);
  const d = getDataForName(name);
  if (!d) return { fillColor: '#2a2d3a', color: '#444', weight: 1, fillOpacity: 0.5 };
  const winner = getWinner(d);
  const top2 = d.candidates.slice().sort((a,b)=>b.votes-a.votes).slice(0,2);
  const gapPct = top2.length >= 2
    ? Math.abs(top2[0].votes - top2[1].votes) / d.votes * 100
    : 50;
  const intensity = Math.min(gapPct / 20, 1);
  let fillColor;
  if (winner.party === 'ppp') {
    fillColor = `rgba(255,${Math.round(80-intensity*60)},${Math.round(80-intensity*60)},0.85)`;
  } else if (winner.party === 'dp') {
    fillColor = `rgba(${Math.round(60-intensity*40)},${Math.round(120-intensity*50)},255,0.85)`;
  } else {
    fillColor = `rgba(150,150,150,0.75)`;
  }
  return {
    fillColor,
    color: highlight ? '#fff' : 'rgba(255,255,255,0.25)',
    weight: highlight ? 2.5 : 1,
    fillOpacity: highlight ? 0.95 : 0.82,
  };
}

// 툴팁
function bindTooltip(layer, feature) {
  const name = featureName(feature);
  const d = getDataForName(name);
  if (!d) return;
  const sorted = d.candidates.slice().sort((a,b) => b.votes - a.votes);
  const w = sorted[0], r = sorted[1];
  const wPct = (w.votes / d.votes * 100).toFixed(1);
  const rPct = r ? (r.votes / d.votes * 100).toFixed(1) : '';
  const wColor = partyColor(w.party);
  const rColor = r ? partyColor(r.party) : '#888';
  layer.bindTooltip(`
    <div class="map-tooltip">
      <div class="tt-name">${name}
        <span class="tt-winner" style="background:${wColor};color:#fff">${w.partyName} 우세</span>
      </div>
      <div class="tt-row">
        <span class="tt-cand" style="color:${wColor}">▲ ${w.name}</span>
        <span class="tt-pct" style="color:${wColor}">${wPct}%</span>
      </div>
      ${r ? `<div class="tt-row">
        <span class="tt-cand" style="color:${rColor}">▼ ${r.name}</span>
        <span class="tt-pct" style="color:${rColor}">${rPct}%</span>
      </div>` : ''}
    </div>
  `, { sticky: true, opacity: 1 });
}

// 상세 패널
function showDetailPanel(sigName) {
  // ec=4 청주시/천안시 구는 상위 시명으로 표시
  let displayName = sigName;
  const d = getDataForName(sigName);
  if (!d) return;

  const sorted = d.candidates.slice().sort((a,b) => b.votes - a.votes);
  const winner = sorted[0];
  const badgeClass = winner.party === 'ppp' ? 'winner-ppp' : winner.party === 'dp' ? 'winner-dp' : 'winner-ind';
  const badgeText = winner.partyName + ' 당선';

  document.getElementById('detailTitle').innerHTML =
    `${displayName} <span class="winner-badge ${badgeClass}">${badgeText}</span>`;

  const maxPct = sorted[0].votes / d.votes * 100;
  let html = sorted.map(c => {
    const pct = (c.votes / d.votes * 100);
    const color = partyColor(c.party);
    return `
      <div class="cand-row">
        <div class="cand-name" style="color:${color}">${c.name}<br><span style="font-size:0.68rem;color:#777">${c.partyName}</span></div>
        <div class="cand-bar-wrap">
          <div class="cand-bar" style="width:${(pct/maxPct*100).toFixed(1)}%;background:${color};opacity:0.85"></div>
          <div class="cand-votes">${fmt(c.votes)}표</div>
        </div>
        <div class="cand-pct" style="color:${color}">${pct.toFixed(2)}%</div>
      </div>`;
  }).join('');

  const turnout = (d.votes / d.voters * 100).toFixed(1);
  const gap = sorted[0].votes - (sorted[1] ? sorted[1].votes : 0);
  const gapPct = (gap / d.votes * 100).toFixed(2);

  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailExtra').innerHTML =
    `유권자: <span>${fmt(d.voters)}명</span> &nbsp;·&nbsp; 투표자: <span>${fmt(d.votes)}명</span> &nbsp;·&nbsp; 투표율: <span>${turnout}%</span><br>
     표차: <span>${fmt(gap)}표</span> (<span>${gapPct}%p</span>)`;
  document.getElementById('detailPanel').classList.add('show');
}

// ── 요약 바 ──────────────────────────────────────────────────
function buildSummaryBar() {
  const bar = document.getElementById('summaryBar');
  if (currentRegion === 'seoul') {
    // 서울 전체 합산
    let dp = 0, ppp = 0, voters = 0, votes = 0;
    let dpWins = 0, pppWins = 0;
    Object.values(seoulData).forEach(d => {
      voters += d.voters; votes += d.votes;
      d.candidates.forEach(c => {
        if (c.party === 'dp') dp += c.votes;
        if (c.party === 'ppp') ppp += c.votes;
      });
      const w = getWinner(d);
      if (w.party === 'ppp') pppWins++; else dpWins++;
    });
    const dpPct = (dp/votes*100).toFixed(2);
    const pppPct = (ppp/votes*100).toFixed(2);
    const gap = Math.abs(ppp - dp);
    const gapPct = Math.abs(parseFloat(pppPct) - parseFloat(dpPct)).toFixed(2);
    const winner = ppp > dp;
    bar.innerHTML = `
      <div class="summary-item">
        <div class="label">당선인</div>
        <div class="value ppp-color">오세훈 당선</div>
      </div>
      <div class="divider"></div>
      <div class="summary-item">
        <div class="label">🔴 오세훈 (국민의힘)</div>
        <div class="value ppp-color">${pppPct}% · ${fmt(Math.round(ppp/10000))}만표</div>
      </div>
      <div class="summary-item">
        <div class="label">🔵 정원오 (더불어민주당)</div>
        <div class="value dp-color">${dpPct}% · ${fmt(Math.round(dp/10000))}만표</div>
      </div>
      <div class="divider"></div>
      <div class="summary-item vote-bar-wrap">
        <div class="vote-bar-labels">
          <span class="dp-color">민주 ${dpPct}%</span>
          <span class="ppp-color">국힘 ${pppPct}%</span>
        </div>
        <div class="vote-bar">
          <div class="dp-seg"  style="width:${(dp/(dp+ppp)*100).toFixed(1)}%"></div>
          <div class="ppp-seg" style="width:${(ppp/(dp+ppp)*100).toFixed(1)}%"></div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="summary-item">
        <div class="label">표차</div>
        <div class="value" style="color:#ffc107">${fmt(gap)}표 (${gapPct}%p)</div>
      </div>
      <div class="summary-item">
        <div class="label">우세 구</div>
        <div class="value"><span class="ppp-color">국힘 ${pppWins}구</span> · <span class="dp-color">민주 ${dpWins}구</span></div>
      </div>`;
  } else {
    const region = currentRegion === 'chungbuk' ? '충북' : '충남';
    const prefix = `${region}__${currentEc}__`;
    const entries = Object.entries(chungData).filter(([k]) => k.startsWith(prefix));

    if (currentEc === 3) {
      // 시도지사 – 지역 합산
      const totals = {};
      let totalVoters = 0, totalVotes = 0;
      const seen = new Set(); // ec=3 충북 청주시는 4구로 나뉘어 중복 집계됨 → 유권자 중복 주의
      // 실제로 chungData ec=3 청주시 각 구는 도지사 선거 기준 각 구의 집계이므로 합산 가능
      entries.forEach(([k, d]) => {
        totalVoters += d.voters;
        totalVotes  += d.votes;
        d.candidates.forEach(c => {
          totals[c.party] = (totals[c.party] || { votes: 0, name: c.name, partyName: c.partyName });
          totals[c.party].votes += c.votes;
        });
      });
      const sorted = Object.entries(totals).sort((a,b) => b[1].votes - a[1].votes);
      const w = sorted[0]?.[1], r = sorted[1]?.[1];
      if (!w) { bar.innerHTML = ''; return; }
      const wPct = (w.votes/totalVotes*100).toFixed(2);
      const rPct = r ? (r.votes/totalVotes*100).toFixed(2) : '0';
      const gap = w.votes - (r ? r.votes : 0);
      const gapPct = (gap/totalVotes*100).toFixed(2);
      const wColor = partyColor(sorted[0][0]);
      const rColor = r ? partyColor(sorted[1][0]) : '#888';
      bar.innerHTML = `
        <div class="summary-item">
          <div class="label">당선인</div>
          <div class="value" style="color:${wColor}">${w.name} 당선</div>
        </div>
        <div class="divider"></div>
        <div class="summary-item">
          <div class="label" style="color:${wColor}">▲ ${w.name} (${w.partyName})</div>
          <div class="value" style="color:${wColor}">${wPct}% · ${fmt(w.votes)}표</div>
        </div>
        ${r ? `<div class="summary-item">
          <div class="label" style="color:${rColor}">▼ ${r.name} (${r.partyName})</div>
          <div class="value" style="color:${rColor}">${rPct}% · ${fmt(r.votes)}표</div>
        </div>` : ''}
        <div class="divider"></div>
        <div class="summary-item vote-bar-wrap">
          <div class="vote-bar-labels">
            <span style="color:${rColor}">${r ? r.partyName : ''} ${rPct}%</span>
            <span style="color:${wColor}">${w.partyName} ${wPct}%</span>
          </div>
          <div class="vote-bar">
            ${r ? `<div style="flex:${r.votes};background:${rColor}"></div>` : ''}
            <div style="flex:${w.votes};background:${wColor}"></div>
          </div>
        </div>
        <div class="divider"></div>
        <div class="summary-item">
          <div class="label">표차</div>
          <div class="value" style="color:#ffc107">${fmt(gap)}표 (${gapPct}%p)</div>
        </div>
        <div class="summary-item">
          <div class="label">투표율</div>
          <div class="value" style="color:#ccc">${(totalVotes/totalVoters*100).toFixed(1)}%</div>
        </div>`;
    } else {
      // 구시군장 – 시군별 당선 현황 (중복 없음)
      // ec=4는 시 단위이므로 청주시/천안시가 하나씩 있음
      let dpWins = 0, pppWins = 0, otherWins = 0;
      entries.forEach(([k, d]) => {
        const w = getWinner(d);
        if (w.party === 'dp') dpWins++;
        else if (w.party === 'ppp') pppWins++;
        else otherWins++;
      });
      const total = entries.length;
      bar.innerHTML = `
        <div class="summary-item">
          <div class="label">구시군장 당선 현황</div>
          <div class="value">총 ${total}개 시·군</div>
        </div>
        <div class="divider"></div>
        <div class="summary-item">
          <div class="label">🔵 더불어민주당</div>
          <div class="value dp-color">${dpWins}곳 당선</div>
        </div>
        <div class="summary-item">
          <div class="label">🔴 국민의힘</div>
          <div class="value ppp-color">${pppWins}곳 당선</div>
        </div>
        ${otherWins > 0 ? `
        <div class="summary-item">
          <div class="label">기타</div>
          <div class="value" style="color:#aaa">${otherWins}곳</div>
        </div>` : ''}
        <div class="divider"></div>
        <div class="summary-item vote-bar-wrap">
          <div class="vote-bar-labels">
            <span class="dp-color">민주 ${dpWins}곳</span>
            <span class="ppp-color">국힘 ${pppWins}곳</span>
          </div>
          <div class="vote-bar">
            <div class="dp-seg"  style="width:${(dpWins/total*100).toFixed(0)}%"></div>
            <div class="ppp-seg" style="width:${(pppWins/total*100).toFixed(0)}%"></div>
          </div>
        </div>`;
    }
  }
}

// ── 사이드바 ─────────────────────────────────────────────────
function buildSidebar(names) {
  // names: [{sigName, displayName, d}]
  const container = document.getElementById('districtList');
  container.innerHTML = '';

  const sorted = names
    .filter(({d}) => d)
    .map(({sigName, displayName, d}) => {
      const top2 = d.candidates.slice().sort((a,b)=>b.votes-a.votes);
      const w = top2[0], r = top2[1];
      const gapPct = r ? Math.abs(w.votes - r.votes) / d.votes * 100 : 50;
      return { sigName, displayName, d, w, gapPct };
    })
    .sort((a,b) => b.gapPct - a.gapPct);

  // 당선자별로 묶기
  const grouped = {};
  sorted.forEach(item => {
    const p = item.w.party;
    if (!grouped[p]) grouped[p] = [];
    grouped[p].push(item);
  });
  const order = ['ppp','dp','reform','ind','justice','progress','other'];
  const all = order.flatMap(p => grouped[p] || []);

  all.forEach((item, i) => {
    const color = partyColor(item.w.party);
    const div = document.createElement('div');
    div.className = 'district-item';
    div.dataset.name = item.sigName;
    div.innerHTML = `
      <div class="district-rank">${i+1}</div>
      <div class="district-color-dot" style="background:${color}"></div>
      <div class="district-name">
        <div style="font-weight:600">${item.displayName}</div>
        <div style="font-size:0.7rem;color:#666;margin-top:1px">${item.w.name} ${(item.w.votes/item.d.votes*100).toFixed(1)}% · 격차 ${item.gapPct.toFixed(1)}%p</div>
      </div>
      <div class="district-gap ${item.w.party === 'ppp' ? 'ppp' : item.w.party === 'dp' ? 'dp' : 'ind'}">+${item.gapPct.toFixed(1)}%p</div>
    `;
    div.addEventListener('click', () => {
      showDetailPanel(item.sigName);
      document.querySelectorAll('.district-item').forEach(el => el.classList.remove('active'));
      div.classList.add('active');
      if (geojsonLayer) {
        geojsonLayer.eachLayer(layer => {
          const n = featureName(layer.feature);
          if (normName(n) === normName(item.sigName) || n === item.sigName) {
            map.fitBounds(layer.getBounds(), {padding:[20,20]});
            if (selectedLayer && selectedLayer !== layer) {
              selectedLayer.setStyle(getStyle(selectedLayer.feature, false));
            }
            selectedLayer = layer;
            layer.setStyle(getStyle(layer.feature, true));
          }
        });
      }
    });
    container.appendChild(div);
  });
}

// ── GeoJSON 로드 및 레이어 구성 ──────────────────────────────
function loadAndRender() {
  const loading = document.getElementById('mapLoading');
  loading.classList.add('show');

  if (geojsonLayer) { map.removeLayer(geojsonLayer); geojsonLayer = null; }
  selectedLayer = null;
  document.getElementById('detailPanel').classList.remove('show');

  const isSeoul = currentRegion === 'seoul';
  const cacheKey = isSeoul ? 'seoul' : 'chung';
  const url = isSeoul ? GEOJSON_URLS.seoul : GEOJSON_URLS.chung;

  function render(geojson) {
    loading.classList.remove('show');
    let features = geojson.features;

    if (!isSeoul) {
      const code = REGION_CODE[currentRegion];
      features = features.filter(f => {
        const cd = f.properties.SIG_CD || f.properties.sig_cd || '';
        return cd.startsWith(code);
      });
    }

    const filtered = { ...geojson, features };
    const sidebarNames = [];

    geojsonLayer = L.geoJSON(filtered, {
      style: feature => getStyle(feature),
      onEachFeature: (feature, layer) => {
        const raw = featureName(feature);
        const d = getDataForName(raw);
        // displayName: ec=4 청주시상당구 → 청주시상당구 (그대로 표시, 데이터는 청주시)
        sidebarNames.push({ sigName: raw, displayName: raw, d });
        bindTooltip(layer, feature);
        layer.on({
          mouseover(e) { e.target.setStyle(getStyle(feature, true)); e.target.bringToFront(); },
          mouseout(e)  { if (selectedLayer !== e.target) e.target.setStyle(getStyle(feature, false)); },
          click(e) {
            if (selectedLayer && selectedLayer !== e.target) {
              selectedLayer.setStyle(getStyle(selectedLayer.feature, false));
            }
            selectedLayer = e.target;
            e.target.setStyle(getStyle(feature, true));
            showDetailPanel(raw);
            document.querySelectorAll('.district-item').forEach(el => {
              el.classList.toggle('active', normName(el.dataset.name) === normName(raw));
            });
          }
        });
      }
    }).addTo(map);

    // Fit bounds
    try { map.fitBounds(geojsonLayer.getBounds(), {padding:[20,20]}); } catch(e) {}

    buildSidebar(sidebarNames);
    buildSummaryBar();
  }

  if (geojsonCache[cacheKey]) {
    render(geojsonCache[cacheKey]);
  } else {
    fetch(url)
      .then(r => r.json())
      .then(data => { geojsonCache[cacheKey] = data; render(data); })
      .catch(err => {
        loading.classList.remove('show');
        console.error('GeoJSON 로드 실패:', err);
      });
  }
}

// ── 탭 이벤트 ────────────────────────────────────────────────
document.querySelectorAll('.region-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const region = tab.dataset.region;
    if (region === currentRegion) return;
    currentRegion = region;
    currentEc = 3;
    document.querySelectorAll('.region-tab').forEach(t => t.classList.toggle('active', t === tab));
    // ec 탭 가시성
    const ecWrap = document.getElementById('ecTabsWrap');
    if (region === 'seoul') {
      ecWrap.classList.add('hidden');
    } else {
      ecWrap.classList.remove('hidden');
      document.querySelectorAll('.ec-tab').forEach(t => t.classList.toggle('active', t.dataset.ec === '3'));
    }
    loadAndRender();
  });
});

document.querySelectorAll('.ec-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const ec = parseInt(tab.dataset.ec);
    if (ec === currentEc) return;
    currentEc = ec;
    document.querySelectorAll('.ec-tab').forEach(t => t.classList.toggle('active', t === tab));
    // GeoJSON은 같은 지역 → 레이어만 스타일 재적용 + 사이드바 재구성
    if (geojsonLayer) {
      geojsonLayer.eachLayer(layer => layer.setStyle(getStyle(layer.feature)));
      // 툴팁 재바인딩
      geojsonLayer.eachLayer(layer => {
        layer.unbindTooltip();
        bindTooltip(layer, layer.feature);
      });
      // 사이드바 재구성
      const names = [];
      geojsonLayer.eachLayer(layer => {
        const raw = featureName(layer.feature);
        names.push({ sigName: raw, displayName: raw, d: getDataForName(raw) });
      });
      buildSidebar(names);
      buildSummaryBar();
      document.getElementById('detailPanel').classList.remove('show');
      if (selectedLayer) { selectedLayer.setStyle(getStyle(selectedLayer.feature, false)); selectedLayer = null; }
    }
  });
});

document.getElementById('detailClose').addEventListener('click', () => {
  document.getElementById('detailPanel').classList.remove('show');
  if (selectedLayer) {
    selectedLayer.setStyle(getStyle(selectedLayer.feature, false));
    selectedLayer = null;
  }
  document.querySelectorAll('.district-item').forEach(el => el.classList.remove('active'));
});

// ── 초기 로드 ────────────────────────────────────────────────
loadAndRender();
</script>
